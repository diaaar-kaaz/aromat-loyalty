name: Supabase backup

# Ежедневный зашифрованный бэкап базы Aromat.
# Требует два секрета репозитория (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL   — строка подключения (Session pooler, порт 5432) из Supabase → Connect
#   BACKUP_PASSPHRASE — пароль шифрования бэкапа (СОХРАНИ его — без него не расшифровать)

on:
  schedule:
    - cron: '0 3 * * *'      # каждый день в 03:00 UTC (~08:00 Астана)
  workflow_dispatch: {}       # + запуск вручную из вкладки Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump & encrypt database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -eo pipefail
          TS=$(date -u +%Y-%m-%d_%H%M)
          echo "TS=$TS" >> "$GITHUB_ENV"
          # pg_dump матчащим клиентом (PG17) → gzip → шифрование AES256
          docker run --rm -e DB_URL="$DB_URL" postgres:17 \
            sh -c 'pg_dump --no-owner --no-privileges "$DB_URL"' \
            | gzip \
            | gpg --batch --yes --symmetric --cipher-algo AES256 \
                  --passphrase "$PASSPHRASE" -o "aromat-backup-$TS.sql.gz.gpg"
          echo "Размер бэкапа:"; ls -lh aromat-backup-*.sql.gz.gpg

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: aromat-db-backup-${{ env.TS }}
          path: aromat-backup-*.sql.gz.gpg
          retention-days: 90
